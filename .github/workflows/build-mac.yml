name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    # Updated to v4
    - uses: actions/checkout@v4

    # Updated to v5
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "TrendyolScraper" trendyol_scraper.py

    # Updated to v4 (This fixes your error)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrendyolScraper-macOS
        path: dist/TrendyolScraper.app

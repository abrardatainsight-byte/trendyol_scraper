name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Use the version you developed with

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        # --windowed creates a .app bundle without a background terminal
        pyinstaller --noconfirm --onedir --windowed --name "TrendyolScraper" trendyol_scraper.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: TrendyolScraper-macOS
        path: dist/TrendyolScraper.app
